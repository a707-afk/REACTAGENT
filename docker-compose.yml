# EcomAgent — Docker Compose (dev)
# Start: docker compose up -d qdrant postgres
# Includes: App server, PostgreSQL, Qdrant (server mode for concurrent access)

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://csagent:csagent@postgres:5432/csagent
      - QDRANT_PATH=/data/qdrant_local
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
      - QWEN_EMBEDDING_MODEL_PATH=/models/qwen3-embedding
      - INFERENCE_DEVICE=cpu
      - DEBUG=false
    volumes:
      - ./data:/data
      - qdrant_data:/data/qdrant_local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=csagent
      - POSTGRES_PASSWORD=csagent
      - POSTGRES_DB=csagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csagent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
