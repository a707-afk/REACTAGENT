# EcomAgent — Docker Compose (dev)
# Start: docker compose up -d qdrant postgres redis
# Includes: App server, Worker, PostgreSQL, Redis, Qdrant (server mode)

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ecomagent:ecomagent@postgres:5432/ecomagent
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - SENSENOVA_API_KEYS=${SENSENOVA_API_KEYS:-}
      - QWEN_EMBEDDING_MODEL_PATH=/models/qwen3-embedding
      - INFERENCE_DEVICE=cpu
      - DEBUG=false
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker.worker"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://ecomagent:ecomagent@postgres:5432/ecomagent
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - SENSENOVA_API_KEYS=${SENSENOVA_API_KEYS:-}
      - QWEN_EMBEDDING_MODEL_PATH=/models/qwen3-embedding
      - INFERENCE_DEVICE=cpu
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=ecomagent
      - POSTGRES_PASSWORD=ecomagent
      - POSTGRES_DB=ecomagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomagent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  redis_data:
