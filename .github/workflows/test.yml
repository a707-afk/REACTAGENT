name: Tests

on:
  push:
    branches: [main, feature/ecom-agent]
  pull_request:
    branches: [main, feature/ecom-agent]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: csagent
          POSTGRES_PASSWORD: csagent
          POSTGRES_DB: csagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://csagent:csagent@localhost:5432/csagent_test
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60

      - name: Verify imports
        run: |
          python -c "from app.db.models.ticket import Ticket, TicketStatus; from app.services.ticket_sm import TicketStateMachine; from app.agent.tools import ALL_TOOLS; print('OK')"
