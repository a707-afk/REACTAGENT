name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: csagent
          POSTGRES_PASSWORD: csagent
          POSTGRES_DB: csagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "wget --spider -q http://localhost:6333/readyz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint check
        run: |
          ruff check --select E,F,I,N --ignore E501 app tests scripts

      - name: Format check
        run: |
          ruff format --check app tests scripts || true

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://csagent:csagent@localhost:5432/csagent_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          API_AUTH_ENABLED: "false"
        run: |
          python -m pytest tests/ -v --tb=short --timeout=60 --cov=app --cov-report=term-missing

      - name: Verify imports
        run: |
          python -c "from app.db.models.ticket import Ticket, TicketStatus; from app.services.ticket_sm import TicketStateMachine; from app.agent.tools import ALL_TOOLS; from app.agent.composite_tools import process_exchange; print('OK')"
